name: Build and Deploy Web Game

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build WebAssembly Game
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: 3.1.70

      - name: Verify build tools
        run: |
          emcc --version
          em++ --version
          make --version

      - name: Download raylib
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git raylib

      - name: Build raylib for WebAssembly
        run: |
          make -C raylib/src PLATFORM=PLATFORM_WEB

      - name: Build Empty_Pointer
        run: |
          make web RAYLIB_SRC=raylib/src

      - name: Verify Pages files
        run: |
          test -f public/index.html
          test -f public/index.js
          test -f public/index.wasm
          test -f public/assets/logo.svg
          ls -lah public

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
