<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Empty_Pointer</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #121218;
            --panel: #1c1d25;
            --text: #eef1f8;
            --muted: #9aa0ae;
            --accent: #3cd2aa;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            display: grid;
            place-items: center;
        }

        main {
            width: min(100vw, 800px);
            aspect-ratio: 4 / 3;
            display: grid;
            place-items: center;
            background: var(--panel);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
            image-rendering: auto;
        }

        #status {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            color: var(--muted);
            font-size: 14px;
            letter-spacing: 0;
            pointer-events: none;
        }

        #status:empty {
            display: none;
        }
    </style>
</head>
<body>
    <main>
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </main>
    <div id="status">Loading Empty_Pointer...</div>

    <script>
        const statusElement = document.getElementById("status");

        var Module = {
            canvas: document.getElementById("canvas"),
            print(text) {
                console.log(text);
            },
            printErr(text) {
                console.error(text);
            },
            setStatus(text) {
                statusElement.textContent = text || "";
            },
            onRuntimeInitialized() {
                statusElement.textContent = "";
            }
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
