<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Empty_Pointer</title>
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/logo.svg">
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #121218;
            color: #eef1f8;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        #pageFrame {
            width: min(100%, 840px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #gameShell {
            position: relative;
            width: min(calc(100vw - 24px), 800px, calc((100dvh - 112px) * 4 / 3));
            aspect-ratio: 4 / 3;
            max-height: calc(100dvh - 112px);
            display: grid;
            place-items: center;
            overflow: hidden;
            background: #121218;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            max-width: 100% !important;
            max-height: 100% !important;
            display: block;
            outline: none;
            image-rendering: auto;
            touch-action: none;
            user-select: none;
        }

        #status {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            color: #9aa0ae;
            font-size: 14px;
            letter-spacing: 0;
            pointer-events: none;
        }

        #status:empty {
            display: none;
        }

        .web-controls {
            width: min(calc(100vw - 24px), 800px);
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }

        .web-button {
            min-height: 42px;
            border: 2px solid #a5ffe1;
            background: #38d0b0;
            color: #081013;
            font: 800 13px "Trebuchet MS", "Segoe UI", sans-serif;
            letter-spacing: 0;
            cursor: pointer;
            touch-action: manipulation;
        }

        .web-button:hover,
        .web-button:focus-visible {
            background: #58f0cf;
        }

        #webMenu {
            display: none;
        }

        body.game-paused #webMenu {
            display: block;
        }

        body.game-paused .web-controls {
            grid-template-columns: repeat(5, minmax(0, 1fr));
        }

        @media (max-width: 680px), (pointer: coarse) {
            body {
                align-items: flex-start;
                justify-content: center;
                padding: max(10px, env(safe-area-inset-top)) 8px max(10px, env(safe-area-inset-bottom));
            }

            #pageFrame {
                width: 100%;
                gap: 8px;
            }

            #gameShell {
                width: min(100%, calc((100dvh - 88px - env(safe-area-inset-top) - env(safe-area-inset-bottom)) * 4 / 3));
                max-height: calc(100dvh - 88px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            }

            .web-controls,
            body.game-paused .web-controls {
                width: min(100%, 800px);
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .web-button {
                min-height: 40px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="pageFrame">
        <main id="gameShell">
            <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0" autofocus></canvas>
        </main>
        <div class="web-controls" aria-label="Game controls">
            <button class="web-button" id="webPause" type="button">PAUSE</button>
            <button class="web-button" id="webGuide" type="button">GUIDE</button>
            <button class="web-button" id="webStart" type="button">START / RESTART</button>
            <button class="web-button" id="webPulse" type="button">PULSE</button>
            <button class="web-button" id="webMenu" type="button">MAIN MENU</button>
        </div>
    </div>
    <div id="status">Loading Empty_Pointer...</div>

    <script>
        const statusElement = document.getElementById("status");
        const canvas = document.getElementById("canvas");
        const gameKeys = new Set([
            "Enter",
            " ",
            "Space",
            "ArrowUp",
            "ArrowDown",
            "ArrowLeft",
            "ArrowRight",
            "w",
            "a",
            "s",
            "d",
            "W",
            "A",
            "S",
            "D",
            "e",
            "E",
            "g",
            "G",
            "p",
            "P"
        ]);

        window.setPausedUi = function(paused) {
            document.body.classList.toggle("game-paused", Boolean(paused));
        };

        function unlockAudio() {
            const fn = Module && Module._EP_UnlockAudio;
            if (typeof fn === "function") {
                fn();
            }
        }

        function fitCanvasToShell() {
            canvas.style.width = "100%";
            canvas.style.height = "100%";
            canvas.style.maxWidth = "100%";
            canvas.style.maxHeight = "100%";
        }

        function focusGame() {
            fitCanvasToShell();
            canvas.focus({ preventScroll: true });
        }

        function callGame(name) {
            focusGame();
            unlockAudio();
            const fn = Module && Module[name];
            if (typeof fn === "function") {
                fn();
            }
        }

        function wireButton(id, exportedName) {
            document.getElementById(id).addEventListener("click", (event) => {
                event.preventDefault();
                event.stopPropagation();
                callGame(exportedName);
            });
        }

        window.addEventListener("load", focusGame);
        window.addEventListener("resize", fitCanvasToShell);
        window.addEventListener("orientationchange", fitCanvasToShell);
        window.addEventListener("pointerdown", () => {
            focusGame();
            unlockAudio();
        });
        window.addEventListener("keydown", (event) => {
            if (gameKeys.has(event.key) || gameKeys.has(event.code)) {
                event.preventDefault();
            }

            focusGame();
            unlockAudio();
        }, { passive: false });

        wireButton("webStart", "_EP_Start");
        wireButton("webGuide", "_EP_Guide");
        wireButton("webPause", "_EP_Pause");
        wireButton("webPulse", "_EP_Attack");
        wireButton("webMenu", "_EP_MainMenu");

        var Module = {
            canvas,
            print(text) {
                console.log(text);
            },
            printErr(text) {
                console.error(text);
            },
            setStatus(text) {
                statusElement.textContent = text || "";
            },
            onRuntimeInitialized() {
                statusElement.textContent = "";
                focusGame();
            }
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
