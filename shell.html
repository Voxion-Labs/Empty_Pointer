<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Empty_Pointer</title>
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/logo.svg">
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #121218;
            color: #eef1f8;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            display: grid;
            place-items: center;
        }

        main {
            width: min(100vw, calc(100vh * 4 / 3));
            height: min(100vh, calc(100vw * 3 / 4));
            display: grid;
            place-items: center;
            background: #121218;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
            image-rendering: auto;
            touch-action: none;
            user-select: none;
        }

        #status {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            color: #9aa0ae;
            font-size: 14px;
            letter-spacing: 0;
            pointer-events: none;
        }

        #status:empty {
            display: none;
        }

    </style>
</head>
<body>
    <main>
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0" autofocus></canvas>
    </main>
    <div id="status">Loading Empty_Pointer...</div>

    <script>
        const statusElement = document.getElementById("status");
        const canvas = document.getElementById("canvas");
        const gameKeys = new Set([
            "Enter",
            " ",
            "Space",
            "ArrowUp",
            "ArrowDown",
            "ArrowLeft",
            "ArrowRight",
            "w",
            "a",
            "s",
            "d",
            "W",
            "A",
            "S",
            "D",
            "e",
            "E",
            "p",
            "P"
        ]);

        function focusGame() {
            canvas.focus({ preventScroll: true });
        }

        window.addEventListener("load", focusGame);
        window.addEventListener("pointerdown", focusGame);
        window.addEventListener("keydown", (event) => {
            if (gameKeys.has(event.key) || gameKeys.has(event.code)) {
                event.preventDefault();
            }

            focusGame();
        }, { passive: false });

        var Module = {
            canvas,
            print(text) {
                console.log(text);
            },
            printErr(text) {
                console.error(text);
            },
            setStatus(text) {
                statusElement.textContent = text || "";
            },
            onRuntimeInitialized() {
                statusElement.textContent = "";
                focusGame();
            }
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
