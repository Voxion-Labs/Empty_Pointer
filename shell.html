<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Empty_Pointer</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #121218;
            color: #eef1f8;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            display: grid;
            place-items: center;
        }

        main {
            width: min(100vw, calc(100vh * 4 / 3));
            height: min(100vh, calc(100vw * 3 / 4));
            display: grid;
            place-items: center;
            background: #121218;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
            image-rendering: auto;
        }

        #status {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            color: #9aa0ae;
            font-size: 14px;
            letter-spacing: 0;
            pointer-events: none;
        }

        #status:empty {
            display: none;
        }

        #actionButton {
            position: fixed;
            right: 18px;
            bottom: 18px;
            min-width: 148px;
            height: 44px;
            border: 2px solid #a5ffe1;
            background: #38d0b0;
            color: #0a1012;
            font: 700 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
            cursor: pointer;
        }

        #actionButton:hover,
        #actionButton:focus-visible {
            background: #58f0cf;
        }
    </style>
</head>
<body>
    <main>
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0" autofocus></canvas>
    </main>
    <div id="status">Loading Empty_Pointer...</div>
    <button id="actionButton" type="button">START / RESTART</button>

    <script>
        const statusElement = document.getElementById("status");
        const canvas = document.getElementById("canvas");
        const actionButton = document.getElementById("actionButton");
        const gameKeys = new Set([
            "Enter",
            " ",
            "Space",
            "ArrowUp",
            "ArrowDown",
            "ArrowLeft",
            "ArrowRight",
            "w",
            "a",
            "s",
            "d",
            "W",
            "A",
            "S",
            "D"
        ]);

        function focusGame() {
            canvas.focus({ preventScroll: true });
        }

        function pressEnterInGame() {
            focusGame();

            const eventInit = {
                key: "Enter",
                code: "Enter",
                keyCode: 13,
                which: 13,
                bubbles: true
            };

            canvas.dispatchEvent(new KeyboardEvent("keydown", eventInit));
            window.dispatchEvent(new KeyboardEvent("keydown", eventInit));

            requestAnimationFrame(() => {
                canvas.dispatchEvent(new KeyboardEvent("keyup", eventInit));
                window.dispatchEvent(new KeyboardEvent("keyup", eventInit));
            });
        }

        window.addEventListener("load", focusGame);
        window.addEventListener("pointerdown", focusGame);
        window.addEventListener("keydown", (event) => {
            if (gameKeys.has(event.key) || gameKeys.has(event.code)) {
                event.preventDefault();
            }

            focusGame();
        }, { passive: false });
        actionButton.addEventListener("click", pressEnterInGame);

        var Module = {
            canvas,
            print(text) {
                console.log(text);
            },
            printErr(text) {
                console.error(text);
            },
            setStatus(text) {
                statusElement.textContent = text || "";
            },
            onRuntimeInitialized() {
                statusElement.textContent = "";
                focusGame();
            }
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
